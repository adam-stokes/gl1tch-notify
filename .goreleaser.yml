# .goreleaser.yml — GoReleaser configuration for gl1tch-notify
# https://goreleaser.com
version: 2

project_name: glitch-notify

builds:
  - id: glitch-notify
    # Place the binary inside the .app bundle structure so the archive
    # contains a complete glitch-notify.app ready for Homebrew to install.
    binary: glitch-notify.app/Contents/MacOS/glitch-notify
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Include the Info.plist so the archive contains a valid .app bundle:
    #   glitch-notify.app/
    #     Contents/
    #       Info.plist
    #       MacOS/
    #         glitch-notify
    files:
      - src: Info.plist
        dst: glitch-notify.app/Contents/

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - name: glitch-notify
    repository:
      owner: 8op-org
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/adam-stokes/gl1tch-notify"
    description: "gl1tch system tray notification daemon"
    license: "MIT"
    install: |
      prefix.install "glitch-notify.app"
      bin.write_exec_script prefix/"glitch-notify.app/Contents/MacOS/glitch-notify"
    test: |
      assert_predicate bin/"glitch-notify", :exist?
    skip_upload: false

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^ci"
      - "^test"
