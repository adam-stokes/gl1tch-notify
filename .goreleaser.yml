# .goreleaser.yml — GoReleaser configuration for gl1tch-notify
# https://goreleaser.com
version: 2

project_name: gl1tch-notify

builds:
  - id: gl1tch-notify
    binary: gl1tch-notify
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - name: gl1tch-notify
    repository:
      owner: 8op-org
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/adam-stokes/gl1tch-notify"
    description: "gl1tch system tray notification daemon"
    license: "MIT"
    install: |
      bin.install "gl1tch-notify"
    test: |
      assert_predicate bin/"gl1tch-notify", :exist?
    skip_upload: false

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^ci"
      - "^test"
